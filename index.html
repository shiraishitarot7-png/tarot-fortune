<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ 今日の恋愛タロット占い ✨</title>

  <!-- ========================================================
       Google Fonts（日本語対応フォント）
       カスタマイズ: 別のフォントに変えたい場合はここを変更
  ======================================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Cinzel+Decorative:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ============================================================
       CSS カスタム変数（テーマカラーの一括変更はここで）
    ============================================================ */
    :root {
      --color-bg-deep:    #0a0015;   /* 最も暗い背景色 */
      --color-bg-mid:     #1a0035;   /* 中間背景色 */
      --color-accent:     #c084fc;   /* アクセントカラー（紫） */
      --color-gold:       #f5c842;   /* ゴールド */
      --color-text-main:  #f0e6ff;   /* メインテキスト */
      --color-text-sub:   #c9b8e8;   /* サブテキスト */
      --color-result-bg:  rgba(30, 0, 60, 0.92); /* 結果パネル背景 */
      --card-width:       180px;     /* カード幅（PC） */
      --card-height:      270px;     /* カード高さ（PC） */
    }

    /* ============================================================
       リセット & ベーススタイル
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: var(--color-bg-deep);
      background-image:
        /* 星空グラデーション */
        radial-gradient(ellipse at 20% 20%, rgba(120, 40, 200, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(60, 10, 120, 0.45) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, rgba(20, 0, 50, 0.8) 0%, transparent 100%);
      font-family: 'Noto Serif JP', serif;
      color: var(--color-text-main);
      overflow-x: hidden;
    }

    /* ============================================================
       星のキャンバス（JS で描画）
    ============================================================ */
    #star-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ============================================================
       メインコンテナ
    ============================================================ */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    /* ============================================================
       ヘッダー部分
    ============================================================ */
    .header {
      text-align: center;
      margin-bottom: 10px;
      animation: fadeInDown 1.2s ease both;
    }

    .header .title-en {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(14px, 3.5vw, 22px);
      color: var(--color-gold);
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px rgba(245, 200, 66, 0.6);
      margin-bottom: 8px;
    }

    .header .title-ja {
      font-size: clamp(22px, 6vw, 38px);
      font-weight: 700;
      color: var(--color-text-main);
      text-shadow: 0 0 30px rgba(192, 132, 252, 0.8);
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    .header .subtitle {
      font-size: clamp(12px, 3vw, 15px);
      color: var(--color-text-sub);
      letter-spacing: 0.08em;
      line-height: 1.8;
    }

    /* ============================================================
       区切り線（装飾）
    ============================================================ */
    .divider {
      width: min(320px, 80vw);
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        var(--color-gold),
        var(--color-accent),
        var(--color-gold),
        transparent
      );
      margin: 20px auto;
      opacity: 0.7;
    }

    /* ============================================================
       カード選択エリア
    ============================================================ */
    .cards-section {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeInUp 1.4s ease both;
    }

    .cards-instruction {
      font-size: clamp(13px, 3.2vw, 16px);
      color: var(--color-accent);
      letter-spacing: 0.1em;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(192, 132, 252, 0.5);
    }

    /* カード3枚を横並びに */
    .cards-wrapper {
      display: flex;
      gap: clamp(16px, 4vw, 36px);
      justify-content: center;
      align-items: flex-end;
      flex-wrap: nowrap;
    }

    /* ============================================================
       個別カードスタイル
    ============================================================ */
    .card-item {
      position: relative;
      width: var(--card-width);
      cursor: pointer;
      transition: transform 0.3s ease, filter 0.3s ease;
      /* フェードインアニメーション（遅延付き） */
      animation: cardAppear 1s ease both;
    }

    /* 各カードの登場遅延 */
    .card-item:nth-child(1) { animation-delay: 0.2s; }
    .card-item:nth-child(2) { animation-delay: 0.5s; transform: translateY(-20px); } /* 中央カードを少し上に */
    .card-item:nth-child(3) { animation-delay: 0.8s; }

    /* ホバー時の浮き上がり効果 */
    .card-item:not(.disabled):hover {
      transform: translateY(-16px) scale(1.04);
      filter: drop-shadow(0 0 24px rgba(192, 132, 252, 0.9))
              drop-shadow(0 0 48px rgba(245, 200, 66, 0.4));
    }

    /* 中央カードのホバー（元のオフセットを維持） */
    .card-item:nth-child(2):not(.disabled):hover {
      transform: translateY(-36px) scale(1.04);
    }

    /* 無効化されたカード（選択後） */
    .card-item.disabled {
      cursor: not-allowed;
      filter: brightness(0.4) saturate(0.3);
      pointer-events: none;
    }

    /* 選択されたカード（明るく） */
    .card-item.selected {
      filter: drop-shadow(0 0 30px rgba(245, 200, 66, 1))
              drop-shadow(0 0 60px rgba(192, 132, 252, 0.8)) !important;
      pointer-events: none;
    }

    /* カード画像本体 */
    .card-img {
      width: 100%;
      height: var(--card-height);
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid rgba(245, 200, 66, 0.5);
      display: block;
      /* 裏面表示（初期状態） */
    }

    /* カード名ラベル */
    .card-label {
      margin-top: 10px;
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(9px, 2.2vw, 11px);
      color: var(--color-gold);
      letter-spacing: 0.1em;
      text-align: center;
      opacity: 0.8;
    }

    /* ============================================================
       カードフリップアニメーション用
    ============================================================ */
    .card-item .card-inner {
      position: relative;
      width: 100%;
      height: var(--card-height);
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-item.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face, .card-back-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(245, 200, 66, 0.5);
    }

    .card-face {
      transform: rotateY(180deg); /* 表面は最初は裏向き */
    }

    .card-face img, .card-back-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ============================================================
       結果表示エリア
    ============================================================ */
    #result-area {
      display: none; /* 初期は非表示 */
      width: min(560px, 92vw);
      background: var(--color-result-bg);
      border: 1px solid rgba(192, 132, 252, 0.5);
      border-radius: 20px;
      padding: 30px 28px;
      text-align: center;
      box-shadow:
        0 0 40px rgba(192, 132, 252, 0.3),
        0 0 80px rgba(120, 40, 200, 0.2),
        inset 0 0 30px rgba(192, 132, 252, 0.05);
      animation: fadeInUp 0.8s ease both;
      margin-top: 10px;
    }

    #result-area.visible {
      display: block;
    }

    /* カード名（結果） */
    .result-card-name {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(14px, 3.5vw, 18px);
      color: var(--color-gold);
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      text-shadow: 0 0 15px rgba(245, 200, 66, 0.7);
    }

    /* 結果タイトル */
    .result-title {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 700;
      color: var(--color-text-main);
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(192, 132, 252, 0.6);
    }

    /* 区切り（星） */
    .result-stars {
      font-size: 18px;
      color: var(--color-gold);
      letter-spacing: 0.3em;
      margin-bottom: 16px;
      display: block;
    }

    /* 占いメッセージ本文 */
    .result-message {
      font-size: clamp(14px, 3.8vw, 17px);
      line-height: 1.9;
      color: var(--color-text-main);
      letter-spacing: 0.06em;
      padding: 16px 12px;
      background: rgba(192, 132, 252, 0.08);
      border-radius: 10px;
      border-left: 3px solid var(--color-accent);
      text-align: left;
      margin-bottom: 24px;
    }

    /* ラッキーアイテム */
    .result-lucky {
      font-size: clamp(12px, 3vw, 14px);
      color: var(--color-text-sub);
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    .result-lucky span {
      color: var(--color-gold);
      font-weight: 700;
    }

    /* もう一度占うボタン */
    #retry-btn {
      display: inline-block;
      padding: 14px 40px;
      background: linear-gradient(135deg, #6d28d9, #9333ea, #c084fc);
      color: #fff;
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(14px, 3.5vw, 16px);
      font-weight: 700;
      letter-spacing: 0.12em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow:
        0 4px 20px rgba(109, 40, 217, 0.6),
        0 0 40px rgba(192, 132, 252, 0.3);
      transition: all 0.3s ease;
      text-decoration: none;
    }

    #retry-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow:
        0 8px 30px rgba(109, 40, 217, 0.8),
        0 0 60px rgba(192, 132, 252, 0.5);
    }

    #retry-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* ============================================================
       フッター
    ============================================================ */
    .footer {
      margin-top: 50px;
      font-size: 11px;
      color: rgba(192, 132, 252, 0.4);
      letter-spacing: 0.1em;
      text-align: center;
      animation: fadeIn 2s ease both;
      animation-delay: 1.5s;
    }

    /* ============================================================
       キーフレームアニメーション
    ============================================================ */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(40px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 中央カードの登場アニメーション（オフセット維持） */
    .card-item:nth-child(2) {
      animation-name: cardAppearCenter;
    }

    @keyframes cardAppearCenter {
      from { opacity: 0; transform: translateY(40px) scale(0.9); }
      to   { opacity: 1; transform: translateY(-20px) scale(1); }
    }

    /* キラキラ点滅 */
    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ============================================================
       レスポンシブ対応（スマートフォン）
    ============================================================ */
    @media (max-width: 480px) {
      :root {
        --card-width:  110px;
        --card-height: 165px;
      }

      .cards-wrapper {
        gap: 12px;
      }

      .card-item:nth-child(2) {
        transform: translateY(-12px);
      }

      .card-item:nth-child(2):not(.disabled):hover {
        transform: translateY(-24px) scale(1.04);
      }

      @keyframes cardAppearCenter {
        from { opacity: 0; transform: translateY(40px) scale(0.9); }
        to   { opacity: 1; transform: translateY(-12px) scale(1); }
      }
    }

    @media (max-width: 360px) {
      :root {
        --card-width:  90px;
        --card-height: 135px;
      }
    }

    /* ============================================================
       パーティクル（花びら）エフェクト用
    ============================================================ */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: petalFall linear infinite;
    }

    @keyframes petalFall {
      0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
    }
  </style>
</head>

<body>

  <!-- 星空キャンバス（JS描画） -->
  <canvas id="star-canvas"></canvas>

  <div class="container">

    <!-- ===== ヘッダー ===== -->
    <header class="header">
      <p class="title-en">✦ Mystic Tarot ✦</p>
      <h1 class="title-ja">今日の恋愛運勢</h1>
      <p class="subtitle">
        心を静めて、あなたの直感に従い<br />
        1枚のカードを選んでください
      </p>
    </header>

    <div class="divider"></div>

    <!-- ===== カード選択エリア ===== -->
    <section class="cards-section">
      <p class="cards-instruction" id="instruction-text">
        ✧ 3枚のカードから1枚を選んでください ✧
      </p>

      <div class="cards-wrapper" id="cards-wrapper">

        <!-- カード1：月のカード -->
        <div class="card-item" id="card-0" onclick="selectCard(0)" role="button" aria-label="カード1を選ぶ">

              <img src="card_back.png" alt="タロットカード裏面" />

            <div class="card-face">
              <img src="card_moon.png" alt="月のカード" />
            </div>
          </div>
          <p class="card-label">THE MOON</p>
        </div>

        <!-- カード2：星のカード（中央・少し上） -->
        <div class="card-item" id="card-1" onclick="selectCard(1)" role="button" aria-label="カード2を選ぶ">
          <div class="card-inner">
            <div class="card-back-face">
              <img src="card_back.png" alt="タロットカード裏面" />
            </div>
            <div class="card-face">
              <img src="card_star.png" alt="星のカード" />

          </div>
          <p class="card-label">THE STAR</p>
        </div>

        <!-- カード3：太陽のカード -->
        <div class="card-item" id="card-2" onclick="selectCard(2)" role="button" aria-label="カード3を選ぶ">

            <div class="card-back-face">
              <img src="card_back.png" alt="タロットカード裏面" />
            </div>
            <div class="card-face">
              <img src="card_sun.png" alt="太陽のカード" />
            </div>
          </div>
          <p class="card-label">THE SUN</p>
        </div>

      </div><!-- /.cards-wrapper -->
    </section>

    <!-- ===== 結果表示エリア（初期は非表示） ===== -->
    <div id="result-area" role="region" aria-live="polite">
      <p class="result-card-name" id="result-card-name"></p>
      <h2 class="result-title" id="result-title"></h2>
      <span class="result-stars">✦ ✧ ✦ ✧ ✦</span>
      <p class="result-message" id="result-message"></p>
      <p class="result-lucky" id="result-lucky"></p>
      <button id="retry-btn" onclick="resetCards()">
        ✨ もう一度占う ✨
      </button>
    </div>

    <!-- ===== フッター ===== -->
    <footer class="footer">
      <p>※ このタロット占いはエンターテインメント目的です</p>
    </footer>

  </div><!-- /.container -->

    /* ============================================================
       状態管理
    ============================================================ */
    let isSelected = false; // カードが選択済みかどうか

    /* ============================================================
       カード選択処理
       @param {number} cardIndex - 選択されたカードのインデックス（0〜2）
    ============================================================ */
    function selectCard(cardIndex) {
      // 既に選択済みの場合は何もしない
      if (isSelected) return;
      isSelected = true;

      const cardData = CARD_DATA[cardIndex];

      // ランダムにメッセージを選択（毎回変わる）
      const msgIndex    = Math.floor(Math.random() * cardData.messages.length);
      const titleIndex  = Math.floor(Math.random() * cardData.titleOptions.length);
      const luckyIndex  = Math.floor(Math.random() * cardData.luckyItems.length);

      // 選択されたカードをフリップ
      const selectedCard = document.getElementById(`card-${cardIndex}`);
      selectedCard.classList.add('flipped', 'selected');

      // 他のカードを無効化（少し遅延）
      setTimeout(() => {
        for (let i = 0; i < 3; i++) {
          if (i !== cardIndex) {
            document.getElementById(`card-${i}`).classList.add('disabled');
          }
        }
      }, 300);

      // 指示テキストを変更
      document.getElementById('instruction-text').textContent =
        `✧ ${cardData.nameJa} が選ばれました ✧`;

      // 結果を表示（フリップアニメーション完了後）
      setTimeout(() => {
        showResult(cardData, titleIndex, msgIndex, luckyIndex);
      }, 900);
    }

    /* ============================================================
       結果表示処理
    ============================================================ */
    function showResult(cardData, titleIndex, msgIndex, luckyIndex) {
      document.getElementById('result-card-name').textContent  = `✦ ${cardData.nameEn} ✦`;
      document.getElementById('result-title').textContent      = cardData.titleOptions[titleIndex];
      document.getElementById('result-message').textContent    = cardData.messages[msgIndex];
      document.getElementById('result-lucky').innerHTML        =
        `🔮 <span>${cardData.luckyItems[luckyIndex]}</span>`;

      const resultArea = document.getElementById('result-area');
      resultArea.classList.add('visible');

      // スムーズスクロール
      setTimeout(() => {
        resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 100);
    }

    /* ============================================================
       リセット処理（「もう一度占う」ボタン）
    ============================================================ */
    function resetCards() {
      isSelected = false;

      // 全カードのクラスをリセット
      for (let i = 0; i < 3; i++) {
        const card = document.getElementById(`card-${i}`);
        card.classList.remove('flipped', 'selected', 'disabled');
      }

      // 指示テキストを元に戻す
      document.getElementById('instruction-text').textContent =
        '✧ 3枚のカードから1枚を選んでください ✧';

      // 結果エリアを非表示
      const resultArea = document.getElementById('result-area');
      resultArea.classList.remove('visible');

      // ページ上部へスクロール
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ============================================================
       星空描画（Canvas）
       カスタマイズ: STAR_COUNT で星の数を変更できます
    ============================================================ */
    (function initStars() {
      const canvas = document.getElementById('star-canvas');
      const ctx    = canvas.getContext('2d');
      const STAR_COUNT = 200; // 星の数
      let stars = [];
      let width, height;

      function resize() {
        width  = canvas.width  = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }

      function createStars() {
        stars = [];
        for (let i = 0; i < STAR_COUNT; i++) {
          stars.push({
            x:        Math.random() * width,
            y:        Math.random() * height,
            r:        Math.random() * 1.8 + 0.2,
            alpha:    Math.random(),
            speed:    Math.random() * 0.008 + 0.002,
            phase:    Math.random() * Math.PI * 2,
            // 一部の星はゴールド色
            color:    Math.random() < 0.15 ? '#f5c842' : '#e8d5ff'
          });
        }
      }

      function drawStars(timestamp) {
        ctx.clearRect(0, 0, width, height);
        stars.forEach(star => {
          // 点滅アニメーション
          const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(timestamp * star.speed + star.phase));
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fillStyle = star.color;
          ctx.globalAlpha = alpha;
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(drawStars);
      }

      resize();
      createStars();
      requestAnimationFrame(drawStars);
      window.addEventListener('resize', () => { resize(); createStars(); });
    })();

    /* ============================================================
       花びらパーティクル生成
       カスタマイズ: PETAL_COUNT で花びらの数を変更できます
    ============================================================ */
    (function initPetals() {
      const PETAL_COUNT = 12;
      const colors = [
        'rgba(255, 182, 193, 0.7)',  // ライトピンク
        'rgba(216, 180, 254, 0.7)',  // ライトパープル
        'rgba(245, 200, 66, 0.5)',   // ゴールド
        'rgba(255, 220, 240, 0.6)',  // ペールピンク
      ];

      for (let i = 0; i < PETAL_COUNT; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';

        const size     = Math.random() * 10 + 6;
        const left     = Math.random() * 100;
        const duration = Math.random() * 12 + 10;
        const delay    = Math.random() * 15;
        const color    = colors[Math.floor(Math.random() * colors.length)];

        petal.style.cssText = `
          width:  ${size}px;
          height: ${size * 0.7}px;
          left:   ${left}%;
          top:    -20px;
          background: ${color};
          animation-duration: ${duration}s;
          animation-delay:    ${delay}s;
        `;

        document.body.appendChild(petal);
      }
    })();
  </script>
